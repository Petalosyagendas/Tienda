<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Pétalos y Agenda | Agendas Personalizadas</title>
    <style>
        :root {
            --bg-principal: #FDFBF7 !important;
            --rosa-pastel: #F3E1E4 !important;
            --azul-pastel: #E1ECF4 !important;
            --lila-pastel: #E8DFF5 !important;
            --gris-perla: #E2E2E2 !important;
            --texto: #4A4A4A !important;
            --oro-pastel: #F1C40F !important;
        }

        html, body {
            background-color: #FDFBF7 !important;
            color: #4A4A4A !important;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header { background-color: var(--rosa-pastel) !important; text-align: center; padding: 2.5rem; border-bottom: 3px solid var(--lila-pastel); }
        .logo-tienda { max-width: 130px; height: 130px; object-fit: cover; border-radius: 50%; margin-bottom: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background-color: white !important; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        section { background: white !important; padding: 2.5rem; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 2.5rem; }
        h2 { color: #6A6A6A !important; border-bottom: 2px solid var(--azul-pastel); padding-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        input, textarea, select { width: 100%; padding: 0.8rem; border: 1px solid var(--gris-perla); border-radius: 10px; background-color: #FCFCFC !important; color: #4A4A4A !important; font-size: 1rem; }
        button { background-color: #25D366 !important; color: white !important; border: none; padding: 1.1rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 1rem; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2); }
        button:hover { background-color: #20ba59 !important; }
        
        /* AVISO DE FECHAS NO DISPONIBLES */
        .aviso-vacaciones {
            background-color: var(--azul-pastel) !important;
            border-left: 4px solid var(--lila-pastel);
            padding: 1rem;
            border-radius: 0 10px 10px 0;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* ESTILOS DE LA GALERÍA / PORTFOLIO */
        .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .galeria-img { width: 100%; height: 240px; object-fit: cover; border-radius: 15px; }

        /* SECCIÓN SOBRE MÍ */
        .sobre-mi-contenido {
            display: flex;
            gap: 2rem;
            align-items: center;
            margin-top: 1.5rem;
        }
        .sobre-mi-foto {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--lila-pastel);
            flex-shrink: 0;
        }
        .sobre-mi-texto p {
            line-height: 1.6;
            margin-bottom: 1rem;
            font-size: 1.05rem;
        }

        /* SECCIÓN: VALORACIONES Y COMENTARIOS */
        .muro-resenas {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .sin-resenas {
            text-align: center;
            color: #888888;
            font-style: italic;
            padding: 2rem;
            background-color: #FDFBF7 !important;
            border-radius: 15px;
            border: 1px dashed var(--gris-perla);
        }
        .btn-dejar-resena {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: var(--lila-pastel) !important;
            color: #4A4A4A !important;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 1.5rem;
            font-size: 1rem;
            border: none;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            transition: background 0.2s;
            text-align: center;
        }
        .btn-dejar-resena:hover {
            background-color: var(--rosa-pastel) !important;
        }

        /* BOTÓN FLOTANTE DE WHATSAPP */
        .whatsapp-flotante {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25D366 !important;
            color: white !important;
            padding: 14px 24px !important;
            border-radius: 50px !important;
            text-decoration: none !important;
            font-weight: bold !important;
            font-size: 1rem !important;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2) !important;
            z-index: 99999 !important;
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
        }

        /* Adaptación para móviles */
        @media (max-width: 600px) {
            .sobre-mi-contenido {
                flex-direction: column;
                text-align: center;
            }
            .whatsapp-flotante {
                bottom: 20px !important;
                right: 20px !important;
                padding: 12px 20px !important;
                font-size: 0.9rem !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo-tienda">
        <h1>Pétalos y Agenda</h1>
    </header>

    <div class="container">
        
        <section id="sobre-mi">
            <h2>Sobre mí</h2>
            <div class="sobre-mi-contenido">
                <img src="logo.png" alt="Creadora" class="sobre-mi-foto">
                <div class="sobre-mi-texto">
                    <p>¡Hola! Soy la persona que está detrás de estas agendas personalizadas, creadas con cariño, creatividad y mucha atención a los detalles.</p>
                    <p>Me encanta diseñar agendas únicas que reflejen la personalidad, gustos y necesidades de cada persona.

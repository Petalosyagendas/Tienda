<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pétalos y Agenda | Agendas Personalizadas</title>
    <style>
        :root {
            --bg-principal: #FDFBF7;
            --rosa-pastel: #F3E1E4;
            --azul-pastel: #E1ECF4;
            --lila-pastel: #E8DFF5;
            --gris-perla: #E2E2E2;
            --texto: #4A4A4A;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--rosa-pastel);
            text-align: center;
            padding: 2.5rem;
            border-bottom: 3px solid var(--lila-pastel);
        }

        header h1 {
            margin: 0;
            font-size: 2.8rem;
            color: #5A5A5A;
            font-weight: 400;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        section {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            margin-bottom: 2.5rem;
        }

        h2 {
            color: #6A6A6A;
            border-bottom: 2px solid var(--azul-pastel);
            padding-bottom: 0.5rem;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            font-size: 0.95rem;
        }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--gris-perla);
            border-radius: 10px;
            box-sizing: border-box;
            background-color: #FCFCFC;
            font-size: 1rem;
        }

        .radio-group {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        /* Caja de Precio Total */
        .precio-box {
            background-color: var(--azul-pastel);
            padding: 1.2rem;
            border-radius: 12px;
            text-align: center;
            margin: 1.5rem 0;
            font-size: 1.3rem;
            font-weight: bold;
            color: #4A4A4A;
            border: 1px solid #B8C6DB;
        }

        button {
            background-color: var(--lila-pastel);
            color: var(--texto);
            border: none;
            padding: 1.1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button:hover {
            background-color: var(--rosa-pastel);
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .galeria-item {
            background-color: var(--bg-principal);
            border: 2px dashed var(--gris-perla);
            border-radius: 15px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            color: #A0A0A0;
        }

        .whatsapp-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25D366;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pétalos y Agenda</h1>
        <p style="color: #7A7A7A; margin: 0.5rem 0 0 0;">Agendas personalizadas de anillas</p>
    </header>

    <div class="container">

        <section id="personalizar">
            <h2>Configura tu Agenda</h2>
            <form id="orderForm">
                
                <div class="form-group">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="fecha">¿A partir de qué día/mes quieres que empiece tu agenda?</label>
                    <input type="text" id="fecha" placeholder="Ej: Septiembre 2026, 1 de Enero..." required>
                </div>

                <div class="form-group">
                    <label for="papel">Grosor del papel:</label>
                    <select id="papel" onchange="actualizarPrecio()">
                        <option value="80gr" data-precio="21.50">80 gr — 21,50€</option>
                        <option value="90gr" data-precio="27.00">90 gr — 27,00€</option>
                        <option value="100gr" data-precio="33.00">100 gr — 33,00€</option>
                    </select>
                </div>

                <!-- NUEVO: Selección de Tipo de Anillas -->
                <div class="form-group">
                    <label for="anillas">Tipo de anillas:</label>
                    <select id="anillas" onchange="actualizarPrecio()">
                        <option value="Plata / Básicas" data-extra="0.00">Anillas estándar (Plata) — Sin coste extra</option>
                        <option value="De color" data-extra="0.50">Anillas de color (Rosa, azul, lila...) — +0,50€</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="detalles">Preguntas de diseño (Colores preferidos, temáticas, frases para la portada...):</label>
                    <textarea id="detalles" rows="5" placeholder="Cuéntame detalladamente cómo te gustaría el diseño, si has elegido anillas de color dime qué color te gustaría, etc."></textarea>
                </div>

                <div class="form-group">
                    <label>Método de pago:</label>
                    <div class="radio-group">
                        <label class="radio-option"><input type="radio" name="pago" value="Bizum" checked> Bizum</label>
                        <label class="radio-option"><input type="radio" name="pago" value="Tarjeta"> Tarjeta</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Método de entrega:</label>
                    <div class="radio-group">
                        <label class="radio-option"><input type="radio" name="entrega" value="Envío a domicilio" checked> Envío a domicilio</label>
                        <label class="radio-option"><input type="radio" name="entrega" value="Recoger"> Recoger</label>
                    </div>
                </div>

                <div class="precio-box">
                    Precio total estimado: <span id="precioTotal">21,50</span>€
                </div>

                <button type="button" onclick="enviarPorWhatsApp()">Enviar diseño por WhatsApp 💬</button>
            </form>
        </section>

        <section id="portfolio">
            <h2>Agendas que ya he hecho</h2>
            <p style="color: #7A7A7A;">Inspírate con algunos de mis trabajos anteriores:</p>
            <div class="galeria">
                <div class="galeria-item">Foto Agenda 1</div>
                <div class="galeria-item">Foto Agenda 2</div>
                <div class="galeria-item">Foto Agenda 3</div>
            </div>
        </section>

    </div>

    <a href="https://wa.me/34600000000?text=¡Hola!%20Te%20escribo%20desde%20la%20web%20para%20pasarte%20unas%20fotos%20para%20mi%20agenda." class="whatsapp-btn" target="_blank">
        💬 Enviar Fotos por WhatsApp
    </a>

    <script>
        function actualizarPrecio() {
            // Obtener precio del papel
            var selectPapel = document.getElementById('papel');
            var precioPapel = parseFloat(selectPapel.options[selectPapel.selectedIndex].getAttribute('data-precio'));
            
            // Obtener extra de las anillas
            var selectAnillas = document.getElementById('anillas');
            var extraAnillas = parseFloat(selectAnillas.options[selectAnillas.selectedIndex].getAttribute('data-extra'));
            
            // Calcular total
            var total = precioPapel + extraAnillas;
            
            document.getElementById('precioTotal').innerText = total.toFixed(2).replace('.', ',');
        }

        function enviarPorWhatsApp() {
            // REEMPLAZA ESTE NÚMERO POR EL TUYO (con prefijo de país, ej: 34 para España)
            var miTelefono = "34600000000"; 
            
            var nombre = document.getElementById('nombre').value;
            var fecha = document.getElementById('fecha').value;
            
            var papelSelect = document.getElementById('papel');
            var papel = papelSelect.value;
            
            var anillasSelect = document.getElementById('anillas');
            var anillas = anillasSelect.value;
            
            var precioFinal = document.getElementById('precioTotal').innerText + "€";
            var detalles = document.getElementById('detalles').value;
            var pago = document.querySelector('input[name="pago"]:checked').value;
            var entrega = document.querySelector('input[name="entrega"]:checked').value;

            if(!nombre || !fecha) {
                alert("Por favor, rellena al menos tu nombre y cuándo quieres empezar tu agenda.");
                return;
            }

            var mensaje = "¡Hola! He rellenado el formulario de la web para una agenda personalizada:%0A%0A" +
                "*Nombre:* " + encodeURIComponent(nombre) + "%0A" +
                "*Fecha de inicio:* " + encodeURIComponent(fecha) + "%0A" +
                "*Grosor de Papel:* " + encodeURIComponent(papel) + "%0A" +
                "*Tipo de Anillas:* " + encodeURIComponent(anillas) + "%0A" +
                "*Método de Pago:* " + encodeURIComponent(pago) + "%0A" +
                "*Entrega:* " + encodeURIComponent(entrega) + "%0A" +
                "*Detalles del diseño:* " + encodeURIComponent(detalles) + "%0A%0A" +
                "*Precio Total Estimado:* " + encodeURIComponent(precioFinal);

            window.open("https://wa.me/" + miTelefono + "?text=" + mensaje, '_blank');
        }
    </script>

</body>
</html>

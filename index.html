<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Pétalos y Agenda | Agendas Personalizadas</title>

    <style>
        :root {
            --bg-principal: #FDFBF7 !important;
            --rosa-pastel: #F3E1E4 !important;
            --azul-pastel: #E1ECF4 !important;
            --lila-pastel: #E8DFF5 !important;
            --gris-perla: #E2E2E2 !important;
            --texto: #4A4A4A !important;
            --oro-pastel: #F1C40F !important;
        }

        html, body {
            background-color: #FDFBF7 !important;
            color: #4A4A4A !important;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header { background-color: var(--rosa-pastel) !important; text-align: center; padding: 2.5rem; border-bottom: 3px solid var(--lila-pastel); }
        .logo-tienda { max-width: 130px; height: 130px; object-fit: cover; border-radius: 50%; margin-bottom: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background-color: white !important; }

        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }

        section { background: white !important; padding: 2.5rem; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 2.5rem; }

        h2 { color: #6A6A6A !important; border-bottom: 2px solid var(--azul-pastel); padding-bottom: 0.5rem; }

        .form-group { margin-bottom: 1.5rem; }

        input, textarea, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--gris-perla);
            border-radius: 10px;
            background-color: #FCFCFC !important;
            color: #4A4A4A !important;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            background-color: #25D366 !important;
            color: white !important;
            border: none;
            padding: 1.1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }

        .aviso-vacaciones {
            background-color: var(--azul-pastel) !important;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        .whatsapp-flotante {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25D366 !important;
            color: white !important;
            padding: 14px 24px !important;
            border-radius: 50px !important;
            text-decoration: none !important;
            font-weight: bold !important;
        }

        /* 🚨 IMPORTANTE: oculto por defecto */
        #seccion_direccion {
            display: none;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" class="logo-tienda">
    <h1>Pétalos y Agenda</h1>
</header>

<div class="container">

<section>
<h2>Configura tu Agenda</h2>

<div class="aviso-vacaciones">
📢 Pedido mínimo 5 días. Consultar fechas de vacaciones.
</div>

<form id="formulario-pedido">

    <div class="form-group">
        <input id="nombre" placeholder="Nombre" required>
    </div>

    <div class="form-group">
        <input id="telefono_cliente" placeholder="Teléfono" required>
    </div>

    <div class="form-group">
        <input id="correo_cliente" placeholder="Correo" required>
    </div>

    <div class="form-group">
        <input type="date" id="fecha_inicio_agenda" required>
    </div>

    <div class="form-group">
        <input type="date" id="fecha_final_agenda" required>
    </div>

    <div class="form-group">
        <input type="date" id="fecha_entrega" required>
    </div>

    <select id="tematica">
        <option>Pastel</option>
        <option>Anime</option>
    </select>

    <select id="tipo_vista">
        <option>Semanal</option>
        <option>Diaria</option>
    </select>

    <select id="papel">
        <option>80 gr</option>
        <option>90 gr</option>
        <option>100 gr</option>
    </select>

    <select id="anillas">
        <option>Transparentes</option>
        <option>Color (+0,50€)</option>
    </select>

    <select id="marcapaginas">
        <option>No</option>
        <option>Sí (+0,80€)</option>
    </select>

    <textarea id="detalles" placeholder="Detalles"></textarea>

    <label>
        <input type="radio" id="envio_domicilio" name="metodo_entrega"
        value="Envío a domicilio (+3€)" checked onchange="toggleDireccion()">
        Envío a domicilio
    </label>

    <!-- 🚨 OCULTO POR DEFECTO -->
    <div id="seccion_direccion">
        <input id="calle" placeholder="Calle">
        <input id="codigo_postal" placeholder="CP">
        <input id="ciudad" placeholder="Ciudad">
        <input id="provincia" placeholder="Provincia">
    </div>

    <button type="submit">Enviar por WhatsApp</button>

</form>
</section>

</div>

<a class="whatsapp-flotante" href="https://wa.me/34672707366">WhatsApp</a>

<script>

function toggleDireccion() {
    const seccion = document.getElementById('seccion_direccion');
    const envio = document.getElementById('envio_domicilio').checked;

    seccion.style.display = envio ? 'block' : 'none';

    seccion.querySelectorAll('input').forEach(i => {
        i.required = envio;
    });
}

/* 🔥 ACTIVA AL CARGAR */
window.addEventListener("DOMContentLoaded", function () {
    toggleDireccion();
});

document.getElementById('formulario-pedido').addEventListener('submit', function(e){
    e.preventDefault();

    const nombre = document.getElementById('nombre').value;
    const tel = document.getElementById('telefono_cliente').value;
    const correo = document.getElementById('correo_cliente').value;

    const mensaje =
`🌸 NUEVO PEDIDO 🌸

👤 ${nombre}
📞 ${tel}
✉️ ${correo}`;

    window.open(`https://wa.me/34672707366?text=${encodeURIComponent(mensaje)}`, '_blank');
});

</script>

</body>
</html>

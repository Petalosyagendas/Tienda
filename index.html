<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pétalos y Agendas - Personaliza tu Agenda</title>
    <style>
        :root {
            --rosa-pastel: #FFDFE5;
            --azul-pastel: #E1F0F7;
            --lila-pastel: #EADCF0;
            --gris-perla: #F2F1F6;
            --texto-oscuro: #5A545E;
            --rosa-acento: #F3B0C3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--gris-perla);
            color: var(--texto-oscuro);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            color: var(--texto-oscuro);
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #8A8290;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #DDD;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #FAFAFA;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--rosa-acento);
            background-color: #FFF;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #FCFAFD;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #EEE;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Contenedor de la dirección de envío */
        .seccion-direccion {
            margin-top: 15px;
            margin-bottom: 25px;
            padding: 18px;
            border: 1px solid var(--rosa-pastel);
            border-radius: 10px;
            background-color: #FFFDFE;
        }

        .seccion-direccion h4 {
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--texto-oscuro);
            font-size: 16px;
            border-bottom: 1px solid var(--rosa-pastel);
            padding-bottom: 5px;
        }

        .flex-inputs {
            display: flex;
            gap: 12px;
        }

        .flex-inputs > div {
            flex: 1;
        }

        button[type="submit"] {
            width: 100%;
            background-color: var(--rosa-acento);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #E299AC;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Pétalos y Agendas</h2>
    <div class="subtitle">Personaliza tu agenda a tu estilo</div>

    <!-- Reemplaza el action con tu enlace de Formspree cuando lo tengas listo -->
    <form action="https://formspree.io/f/tu_id_aquí" method="POST">
        
        <!-- Datos del Cliente -->
        <div class="form-group">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Tomás" required>
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
        </div>

        <!-- Personalización de la Agenda -->
        <div class="form-group">
            <label for="Estilo">Estilo de la Agenda:</label>
            <select id="estilo" name="estilo_agenda" required>
                <option value="" disabled selected>Selecciona un estilo...</option>
                <option value="Anime">Anime (Ilustraciones y estética japonesa)</option>
                <option value="Pastel Minimalista">Pastel Minimalista (Tonos suaves y limpios)</option>
                <option value="Fantasía">Fantasía / Literatura</option>
                <option value="Floral">Pétalos (Elegante floral)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="detalles">Detalles de personalización (Nombres, frases, portada):</label>
            <textarea id="detalles" name="detalles_personalizacion" rows="3" placeholder="Cuéntame cómo te gustaría que fuera tu portada, interior o si lleva algún nombre grabado..."></textarea>
        </div>

        <!-- Control de Fecha con margen de 5 días mínimos de diseño -->
        <div class="form-group">
            <label for="fecha_entrega">Fecha deseada de entrega:</label>
            <input type="date" id="fecha_entrega" name="fecha_entrega" required>
            <small style="color: #999; font-size: 12px; display: block; margin-top: 4px;">Necesitamos un mínimo de 5 días para preparar tu diseño personalizado.</small>
        </div>

        <!-- NUEVO: Método de Entrega (Envío por 3€) -->
        <div class="form-group">
            <label>Método de Entrega:</label>
            <div class="radio-group">
                <label class="radio-option">
                    <input type="radio" id="envio_domicilio" name="metodo_entrega" value="Envío a domicilio (+3.00€)" checked onchange="toggleDireccion(true)">
                    <span>Envío a domicilio — <strong>3,00 €</strong></span>
                </label>
                <!-- Descomenta si en el futuro permites recogida gratuita -->
                <!--
                <label class="radio-option">
                    <input type="radio" id="recogida_local" name="metodo_entrega" value="Recogida local (Gratis)" onchange="toggleDireccion(false)">
                    <span>Recogida local — <strong>Gratis</strong></span>
                </label>
                -->
            </div>
        </div>

        <!-- NUEVO: Campos desglosados de Dirección de Envío -->
        <div id="seccion_direccion" class="seccion-direccion">
            <h4>Dirección de Envío</h4>
            
            <div class="form-group" style="margin-bottom: 12px;">
                <label for="calle" style="font-size: 13px; margin-bottom: 4px;">Calle, número, piso y puerta:</label>
                <input type="text" id="calle" name="envio_calle" placeholder="Ej. Calle Mayor 12, 3ºB" required>
            </div>
            
            <div class="flex-inputs" style="margin-bottom: 12px;">
                <div>
                    <label for="codigo_postal" style="font-size: 13px; margin-bottom: 4px;">Código Postal:</label>
                    <input type="text" id="codigo_postal" name="envio_cp" placeholder="Ej. 28001" required>
                </div>
                <div>
                    <label for="ciudad" style="font-size: 13px; margin-bottom: 4px;">Ciudad:</label>
                    <input type="text" id="ciudad" name="envio_ciudad" placeholder="Ej. Madrid" required>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 0;">
                <label for="provincia" style="font-size: 13px; margin-bottom: 4px;">Provincia:</label>
                <input type="text" id="provincia" name="envio_provincia" placeholder="Ej. Madrid" required>
            </div>
        </div>

        <!-- Botón de Envío -->
        <button type="submit">Confirmar y Solicitar Agenda</button>
    </form>
</div>

<script>
    // Configuración automática de los 5 días mínimos de diseño
    document.addEventListener("DOMContentLoaded", function() {
        const fechaInput = document.getElementById("fecha_entrega");
        const hoy = new Date();
        
        // Sumar 5 días a la fecha de hoy
        hoy.setDate(hoy.getDate() + 5);
        
        // Formatear la fecha a YYYY-MM-DD para el atributo 'min' del input
        const año = hoy.getFullYear();
        const mes = String(hoy.getMonth() + 1).padStart(2, '0');
        const dia = String(hoy.getDate()).padStart(2, '0');
        
        const fechaMinima = `${año}-${mes}-${dia}`;
        fechaInput.min = fechaMinima;
    });

    // Función para ocultar o mostrar los campos de dirección
    function toggleDireccion(mostrar) {
        const seccion = document.getElementById('seccion_direccion');
        const inputs = seccion.querySelectorAll('input');
        
        if (mostrar) {
            seccion.style.display = 'block';
            inputs.forEach(input => input.required = true);
        } else {
            seccion.style.display = 'none';
            inputs.forEach(input => input.required = false);
        }
    }
</script>

</body>
</html>

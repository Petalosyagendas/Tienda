<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Pétalos y Agenda | Agendas Personalizadas</title>
    <style>
        :root {
            --bg-principal: #FDFBF7 !important;
            --rosa-pastel: #F3E1E4 !important;
            --azul-pastel: #E1ECF4 !important;
            --lila-pastel: #E8DFF5 !important;
            --gris-perla: #E2E2E2 !important;
            --texto: #4A4A4A !important;
        }

        html, body {
            background-color: #FDFBF7 !important;
            color: #4A4A4A !important;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header { background-color: var(--rosa-pastel) !important; text-align: center; padding: 2.5rem; border-bottom: 3px solid var(--lila-pastel); }
        .logo-tienda { max-width: 130px; height: 130px; object-fit: cover; border-radius: 50%; margin-bottom: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background-color: white !important; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        section { background: white !important; padding: 2.5rem; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 2.5rem; }
        h2 { color: #6A6A6A !important; border-bottom: 2px solid var(--azul-pastel); padding-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        input, textarea, select { width: 100%; padding: 0.8rem; border: 1px solid var(--gris-perla); border-radius: 10px; background-color: #FCFCFC !important; color: #4A4A4A !important; font-size: 1rem; }
        button { background-color: var(--lila-pastel) !important; color: #4A4A4A !important; border: none; padding: 1.1rem; font-size: 1.1rem; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 1rem; }
        button:hover { background-color: var(--rosa-pastel) !important; }
        .galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .galeria-img { width: 100%; height: 240px; object-fit: cover; border-radius: 15px; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo-tienda">
        <h1>Pétalos y Agenda</h1>
    </header>

    <div class="container">
        <section id="personalizar">
            <h2>Configura tu Agenda</h2>
            <form action="https://formspree.io/f/meewenda" method="POST">
                
                <div class="form-group">
                    <label>Nombre Completo:</label>
                    <input type="text" name="Nombre" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label>Fecha de inicio:</label>
                    <input type="date" name="Fecha_inicio" required>
                </div>

                <div class="form-group">
                    <label>Grosor del papel:</label>
                    <select name="Papel">
                        <option value="80gr">80 gr — 21,50€</option>
                        <option value="90gr">90 gr — 27,00€</option>
                        <option value="100gr">100 gr — 33,00€</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Tipo de anillas:</label>
                    <select name="Anillas">
                        <option value="Transparentes">Anillas estándar (Transparentes)</option>
                        <option value="De color">Anillas de color (+0,50€)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Detalles del diseño:</label>
                    <textarea name="Detalles" rows="5" placeholder="Cuéntame cómo quieres tu portada, colores, frases..."></textarea>
                </div>

                <button type="submit">Enviar Pedido por Email 📧</button>
            </form>
        </section>

        <section id="portfolio">
            <h2>Agendas que ya he hecho</h2>
            <div class="galeria">
                <img src="agenda_1.jpg" alt="Agenda 1" class="galeria-img">
                <img src="agenda_2.jpg" alt="Agenda 2" class="galeria-img">
                <img src="agenda_3.jpg" alt="Agenda 3" class="galeria-img">
            </div>
        </section>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Clientes | Pétalos y Agendas</title>
    <style>
        :root {
            --bg-principal: #FDFBF7;
            --rosa-pastel: #F3E1E4;
            --azul-pastel: #E1ECF4;
            --lila-pastel: #E8DFF5;
            --texto: #4A4A4A;
        }
        html, body { background-color: var(--bg-principal); color: var(--texto); margin: 0; padding: 0; font-family: sans-serif; }
        header { background-color: var(--lila-pastel); text-align: center; padding: 2rem; border-bottom: 3px solid var(--rosa-pastel); }
        .btn-volver { display: inline-block; margin-top: 10px; color: var(--texto); text-decoration: none; font-weight: bold; background: white; padding: 8px 16px; border-radius: 20px; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .muro-galeria { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .tarjeta-foto { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #F1ECE3; }
        .contenedor-img { width: 100%; height: 320px; background-color: #f9f9f9; }
        .contenedor-img img { width: 100%; height: 100%; object-fit: cover; }
        .pie-foto { padding: 1.2rem; }
        .autor-pedido { font-weight: bold; margin: 0 0 5px 0; }
        .detalles-agenda { font-size: 0.9rem; color: #777; margin: 0; }
    </style>
</head>
<body>

    <header>
        <h1>✨ Galería de Client@s ✨</h1>
        <a href="index.html" class="btn-volver">← Volver a la Tienda</a>
    </header>

    <div class="container">
        <div class="muro-galeria">

            <div class="tarjeta-foto">
                <div class="contenedor-img">
                    <img src="AQUÍ_IRÁ_EL_ENLACE_DE_KLABEL" alt="Agenda Real">
                </div>
                <div class="pie-foto">
                    <p class="autor-pedido">Reseña de Klabel ⭐⭐⭐⭐⭐</p>
                    <p class="detalles-agenda">"Me ha gustado mucho, súper original, ideal incluso para regalar."</p>
                </div>
            </div>

            <div class="tarjeta-foto">
                <div class="contenedor-img">
                    <img src="AQUÍ_IRÁ_EL_ENLACE_DE_TOÑI" alt="Agenda Real">
                </div>
                <div class="pie-foto">
                    <p class="autor-pedido">Reseña de Toñi ⭐⭐⭐⭐⭐</p>
                    <p class="detalles-agenda">"Es preciosa y muy especial."</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
